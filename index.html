<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Dash Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Lexend Exa', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #0055ff, #002266);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            cursor: default;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .menu-screen {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.9);
            padding: 2.5rem;
            border-radius: 1.5rem;
            text-align: center;
            border: 4px solid #fff;
            color: white;
            min-width: 320px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .btn {
            background: #2ecc71;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: transform 0.1s, background 0.2s;
            display: inline-block;
            border: none;
            text-transform: uppercase;
            width: 100%;
            box-shadow: 0 4px 0 #27ae60;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #27ae60;
        }

        .hud {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            color: white;
            font-size: 1.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }

        #mod-menu {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 20, 40, 0.95);
            border: 3px solid #f39c12;
            border-radius: 12px;
            padding: 15px;
            color: white;
            pointer-events: auto;
            width: 280px;
            z-index: 100;
            display: none;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.3);
            max-height: 85vh;
            overflow-y: auto;
        }

        .mod-option {
            margin-bottom: 12px;
            font-size: 0.85rem;
        }

        .mod-option label {
            display: block;
            margin-bottom: 4px;
            color: #bdc3c7;
        }

        input[type="range"], select, input[type="color"], input[type="number"] {
            width: 100%;
            background: #2c3e50;
            color: white;
            border: 1px solid #7f8c8d;
            border-radius: 4px;
            padding: 6px;
        }

        .cheat-btn {
            background: #e67e22;
            font-size: 0.7rem;
            padding: 8px;
            width: 100%;
            border-radius: 4px;
            margin-top: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            border: none;
        }

        .pause-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: white;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            pointer-events: none;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer" id="ui-layer">
        <div id="main-menu" class="menu-screen">
            <h1 class="text-4xl font-bold mb-6 text-white">GEOMETRY DASH</h1>
            <div class="flex flex-col gap-4">
                <button class="btn text-2xl" onclick="startGame()">Play</button>
                <p class="text-sm text-gray-400 mt-2">Press 'M' for Mod Menu</p>
            </div>
        </div>

        <div id="death-screen" class="menu-screen hidden">
            <h2 class="text-3xl font-bold mb-2 text-red-500">CRASHED!</h2>
            <p id="final-score" class="mb-4 text-white">Progress: 0%</p>
            <button class="btn" onclick="startGame()">Try Again</button>
        </div>

        <div id="win-screen" class="menu-screen hidden">
            <h2 class="text-3xl font-bold mb-2 text-green-500">LEVEL COMPLETE!</h2>
            <p class="mb-4 text-white">100% - GG!</p>
            <button class="btn" onclick="startGame()">Replay</button>
        </div>

        <div id="pause-tag" class="pause-indicator hidden">PAUSED</div>
    </div>

    <div id="mod-menu">
        <h3 class="font-bold border-b border-gray-600 pb-2 mb-3 text-yellow-400 flex justify-between">
            MOD MENU <span class="text-[10px] text-gray-400">M to Close</span>
        </h3>
        <div class="mod-option">
            <label>Speed (1-200): <span id="speed-val" class="text-white">9</span></label>
            <input type="range" id="speed-slider" min="1" max="200" step="1" value="9">
        </div>
        <div class="mod-option">
            <label>Cube Color:</label>
            <input type="color" id="color-picker" value="#00ff00">
        </div>
        <div class="mod-option">
            <label>Player Mode:</label>
            <select id="mode-select">
                <option value="CUBE">Cube Mode</option>
                <option value="SHIP">Ship Mode</option>
            </select>
        </div>
        <div class="mod-option flex items-center justify-between">
            <label class="mb-0">God Mode (Invincibility):</label>
            <input type="checkbox" id="god-mode" class="w-5 h-5">
        </div>
        <div class="mod-option flex items-center justify-between">
            <label class="mb-0">Platformer Mode:</label>
            <input type="checkbox" id="platformer-toggle" class="w-5 h-5">
        </div>
        <div class="mod-option flex items-center justify-between">
            <label class="mb-0">Auto-Jump:</label>
            <input type="checkbox" id="auto-jump" class="w-5 h-5">
        </div>
        
        <div class="border-t border-gray-700 mt-2 pt-2">
            <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">Teleportation</p>
            <div class="flex gap-2 mb-2">
                <div class="w-1/2">
                    <label class="text-[9px] uppercase text-gray-400">Progress %</label>
                    <input type="number" id="tp-pct" placeholder="0-100" min="0" max="100" value="50">
                </div>
                <div class="w-1/2">
                    <label class="text-[9px] uppercase text-gray-400">Target Y</label>
                    <input type="number" id="tp-y" placeholder="Height" value="300">
                </div>
            </div>
            <button class="cheat-btn" onclick="percentTeleport()">Teleport to %</button>
            <button class="cheat-btn mt-1 !bg-green-600" onclick="instantWin()">Instant Win (100%)</button>
        </div>
    </div>

    <div class="hud hidden" id="hud">
        <div id="progress-text">0%</div>
        <div id="mode-text">CUBE MODE</div>
        <div id="attempt-text">Attempt 1</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const mainMenu = document.getElementById('main-menu');
    const deathScreen = document.getElementById('death-screen');
    const winScreen = document.getElementById('win-screen');
    const hud = document.getElementById('hud');
    const modMenu = document.getElementById('mod-menu');
    const pauseTag = document.getElementById('pause-tag');
    
    const speedSlider = document.getElementById('speed-slider');
    const speedVal = document.getElementById('speed-val');
    const colorPicker = document.getElementById('color-picker');
    const modeSelect = document.getElementById('mode-select');
    const autoJump = document.getElementById('auto-jump');
    const godMode = document.getElementById('god-mode');
    const platformerToggle = document.getElementById('platformer-toggle');
    const tpPctInput = document.getElementById('tp-pct');
    const tpYInput = document.getElementById('tp-y');

    const GRAVITY_CUBE = 0.9; 
    const GRAVITY_SHIP = 0.45;
    const SHIP_THRUST = -0.9;
    const JUMP_FORCE = -13.5; 
    
    let BASE_SPEED = 9.0;
    const GROUND_HEIGHT = 120;
    const CEILING_HEIGHT = 60;
    const PLAYER_SIZE = 36;
    const BLOCK_SIZE = 40;

    let gameState = 'MENU'; 
    let isInputDown = false;
    let currentSpeed = 0;
    let isPaused = false;
    let keys = {};
    
    let player = {
        x: 180,
        y: 0,
        vy: 0,
        rotation: 0,
        onGround: false,
        color: '#00ff00',
        mode: 'CUBE' 
    };
    
    let obstacles = [];
    let particles = [];
    let distance = 0;
    let attempt = 1;
    let levelLength = 100000;
    let spawnTimer = 0;
    let shipSpikeCount = 0; 

    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        window.addEventListener('keydown', (e) => { 
            if (document.activeElement.tagName === 'INPUT') return;

            keys[e.code] = true;
            if (e.code === 'Space' || e.code === 'ArrowUp') isInputDown = true;
            if (e.code === 'KeyM') toggleModMenu();
        });

        window.addEventListener('keyup', (e) => { 
            keys[e.code] = false;
            if (e.code === 'Space' || e.code === 'ArrowUp') isInputDown = false; 
        });

        speedSlider.oninput = () => {
            BASE_SPEED = parseFloat(speedSlider.value);
            speedVal.innerText = BASE_SPEED;
        };
        colorPicker.oninput = () => {
            player.color = colorPicker.value;
        };
        modeSelect.onchange = () => {
            setMode(modeSelect.value);
        };
    }

    function percentTeleport() {
        if (gameState !== 'PLAYING') return;
        const pct = Math.min(100, Math.max(0, parseFloat(tpPctInput.value)));
        const targetY = parseFloat(tpYInput.value);
        
        if (!isNaN(pct)) {
            distance = (pct / 100) * levelLength;
            obstacles = [];
            if (!isNaN(targetY)) {
                player.y = targetY;
                player.vy = 0;
            }
            toggleModMenu();
        }
    }

    function instantWin() {
        distance = levelLength - 500;
        toggleModMenu();
    }

    function toggleModMenu() {
        if (gameState !== 'PLAYING') return;
        const isVisible = modMenu.style.display === 'block';
        modMenu.style.display = isVisible ? 'none' : 'block';
        isPaused = !isVisible;
        pauseTag.classList.toggle('hidden', !isPaused);
        
        if (isVisible) {
            tpPctInput.blur();
            tpYInput.blur();
        }
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function startGame() {
        gameState = 'PLAYING';
        isPaused = false;
        player.mode = 'CUBE';
        modeSelect.value = 'CUBE';
        player.x = 180;
        player.y = canvas.height - GROUND_HEIGHT - PLAYER_SIZE;
        player.vy = 0;
        player.rotation = 0;
        player.onGround = true;
        player.color = colorPicker.value;
        obstacles = [];
        particles = [];
        distance = 0;
        spawnTimer = 0;
        shipSpikeCount = 0;
        currentSpeed = BASE_SPEED;
        
        mainMenu.classList.add('hidden');
        deathScreen.classList.add('hidden');
        winScreen.classList.add('hidden');
        hud.classList.remove('hidden');
        pauseTag.classList.add('hidden');
        modMenu.style.display = 'none';

        document.getElementById('attempt-text').innerText = `Attempt ${attempt}`;
        document.getElementById('mode-text').innerText = `CUBE MODE`;
        spawnTimer = -100;
    }

    function setMode(newMode) {
        player.mode = newMode;
        modeSelect.value = newMode;
        document.getElementById('mode-text').innerText = `${newMode} MODE`;
        if (newMode === 'SHIP') {
            player.vy = -1;
            shipSpikeCount = 0;
        } else {
            player.vy = 0;
            player.rotation = Math.round(player.rotation / (Math.PI / 2)) * (Math.PI / 2);
        }
    }

    function spawnObstacle(xPos) {
        const floorY = canvas.height - GROUND_HEIGHT;
        
        // Ship mode logic: alternating spikes on floor/ceiling with portals to switch back
        if (player.mode === 'SHIP' && shipSpikeCount >= 4) {
            obstacles.push({ x: xPos, y: floorY - 140, type: 'portal', to: 'CUBE' });
            shipSpikeCount = 0; return;
        }

        if (player.mode === 'SHIP') {
            obstacles.push({ x: xPos, y: floorY, type: 'spike' });
            obstacles.push({ x: xPos, y: CEILING_HEIGHT, type: 'spike', inverted: true });
            shipSpikeCount++;
        } else {
            const rand = Math.random();
            // Refined Cube obstacles to prevent overlap (Cleaned up from screenshot issue)
            if (rand < 0.4) {
                // Triple jump / multi-block section
                obstacles.push({ x: xPos, y: floorY - BLOCK_SIZE, type: 'block' });
                obstacles.push({ x: xPos + BLOCK_SIZE, y: floorY - BLOCK_SIZE, type: 'block' });
                obstacles.push({ x: xPos + BLOCK_SIZE * 2, y: floorY - BLOCK_SIZE, type: 'block' });
                
                // Portal chance
                if (Math.random() > 0.8) {
                    obstacles.push({ x: xPos + BLOCK_SIZE * 5, y: floorY - 180, type: 'portal', to: 'SHIP' });
                }
            } else if (rand < 0.7) {
                // Spike formation
                obstacles.push({ x: xPos, y: floorY, type: 'spike' });
                if (Math.random() > 0.6) obstacles.push({ x: xPos + 40, y: floorY, type: 'spike' });
            } else {
                // Stacked pillars
                obstacles.push({ x: xPos, y: floorY - BLOCK_SIZE, type: 'block' });
                obstacles.push({ x: xPos, y: floorY - BLOCK_SIZE * 2, type: 'block' });
            }
        }
    }

    function die() {
        if (gameState === 'DEAD' || godMode.checked) return;
        gameState = 'DEAD'; attempt++; isPaused = false; modMenu.style.display = 'none';
        for(let i=0; i<30; i++) particles.push({ x: player.x + PLAYER_SIZE/2, y: player.y + PLAYER_SIZE/2, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, life: 1.0, color: player.color });
        setTimeout(() => { deathScreen.classList.remove('hidden'); document.getElementById('final-score').innerText = `Progress: ${Math.floor((distance / levelLength) * 100)}%`; }, 800);
    }

    function win() {
        gameState = 'WIN';
        hud.classList.add('hidden');
        winScreen.classList.remove('hidden');
    }

    function update() {
        if ((gameState !== 'PLAYING' && gameState !== 'DEAD') || isPaused) return;

        if (gameState === 'PLAYING') {
            if (autoJump.checked && player.onGround) player.vy = JUMP_FORCE;

            let moveX = 0;
            if (platformerToggle.checked) {
                if (keys['KeyD'] || keys['ArrowRight']) moveX = BASE_SPEED;
                if (keys['KeyA'] || keys['ArrowLeft']) moveX = -(BASE_SPEED);
                currentSpeed = moveX;
            } else {
                currentSpeed = BASE_SPEED;
            }
            
            if (player.mode === 'CUBE') {
                player.vy += GRAVITY_CUBE;
                if (isInputDown && player.onGround) { player.vy = JUMP_FORCE; player.onGround = false; }
            } else {
                player.vy += isInputDown ? SHIP_THRUST : GRAVITY_SHIP;
                player.vy = Math.max(-8, Math.min(8, player.vy));
            }

            player.y += player.vy;
            
            const scrollAmt = platformerToggle.checked ? moveX : currentSpeed;
            distance += scrollAmt;

            if (distance >= levelLength) win();

            const floorY = canvas.height - GROUND_HEIGHT;
            let currentOnGround = false;

            if (player.y + PLAYER_SIZE >= floorY) {
                player.y = floorY - PLAYER_SIZE; 
                player.vy = 0; 
                currentOnGround = true;
            }

            if (player.mode === 'SHIP' && player.y <= CEILING_HEIGHT) {
                player.y = CEILING_HEIGHT;
                player.vy = 0;
            }

            obstacles.forEach(obs => {
                obs.x -= scrollAmt; 
                const px = player.x, py = player.y;
                if (px + PLAYER_SIZE > obs.x && px < obs.x + 40 && py + PLAYER_SIZE > obs.y && py < obs.y + 40) {
                    if (obs.type === 'spike') { 
                        // Tighter hitboxes for spikes
                        const spikeHitWidth = 12;
                        if (px + PLAYER_SIZE > obs.x + (20-spikeHitWidth/2) && px < obs.x + (20+spikeHitWidth/2)) {
                             if (py + PLAYER_SIZE > obs.y + (obs.inverted ? 5 : -32)) die();
                        }
                    }
                    else if (obs.type === 'block') {
                        // Better floor collision logic for blocks
                        if (py + PLAYER_SIZE - player.vy <= obs.y + 15 && player.vy >= 0) { 
                            player.y = obs.y - PLAYER_SIZE; 
                            player.vy = 0; 
                            currentOnGround = true; 
                        }
                        else die();
                    } else if (obs.type === 'portal') setMode(obs.to);
                }
            });

            player.onGround = currentOnGround;
            if (player.mode === 'CUBE') {
                if (player.onGround) {
                    player.rotation = Math.round(player.rotation / (Math.PI / 2)) * (Math.PI / 2);
                } else {
                    if (platformerToggle.checked) {
                        if (moveX > 0) player.rotation += 0.2;
                        else if (moveX < 0) player.rotation -= 0.2;
                        else if (currentSpeed > 0) player.rotation += 0.1;
                    } else {
                        player.rotation += (currentSpeed / 45) + 0.1;
                    }
                }
            } else player.rotation = player.vy * 0.12;

            obstacles = obstacles.filter(obs => obs.x > -1000 && obs.x < canvas.width + 2000);
            
            spawnTimer += Math.abs(scrollAmt);
            // Spawn distance is now larger to ensure clear platforms
            if (spawnTimer > 700) { 
                spawnObstacle(canvas.width + 200); 
                spawnTimer = 0; 
            }
            
            let prog = Math.floor((distance / levelLength) * 100);
            document.getElementById('progress-text').innerText = `${Math.max(0, prog)}%`;
        }

        particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.025; });
        particles = particles.filter(p => p.life > 0);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const gridOffset = (distance * 0.4) % 100;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        for (let x = -gridOffset; x < canvas.width; x += 100) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }

        ctx.fillStyle = '#0a0a25'; ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);
        if (player.mode === 'SHIP') ctx.fillRect(0, 0, canvas.width, CEILING_HEIGHT);
        ctx.strokeStyle = '#3498db'; ctx.lineWidth = 4; ctx.strokeRect(-5, canvas.height - GROUND_HEIGHT, canvas.width + 10, 5);
        if (player.mode === 'SHIP') ctx.strokeRect(-5, CEILING_HEIGHT - 5, canvas.width + 10, 5);

        obstacles.forEach(obs => {
            if (obs.type === 'spike') {
                ctx.fillStyle = '#e74c3c'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.beginPath();
                if (obs.inverted) { ctx.moveTo(obs.x, obs.y); ctx.lineTo(obs.x + 20, obs.y + 40); ctx.lineTo(obs.x + 40, obs.y); }
                else { ctx.moveTo(obs.x, obs.y); ctx.lineTo(obs.x + 20, obs.y - 40); ctx.lineTo(obs.x + 40, obs.y); }
                ctx.closePath(); ctx.fill(); ctx.stroke();
            } else if (obs.type === 'block') {
                ctx.fillStyle = '#111'; ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 3; ctx.fillRect(obs.x, obs.y, 40, 40); ctx.strokeRect(obs.x, obs.y, 40, 40);
            } else if (obs.type === 'portal') {
                const pCol = obs.to === 'SHIP' ? '#2ecc71' : '#f39c12';
                ctx.fillStyle = pCol; ctx.shadowBlur = 20; ctx.shadowColor = pCol; ctx.beginPath(); ctx.ellipse(obs.x + 20, obs.y, 25, 90, 0, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0; ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
            }
        });

        if (gameState !== 'DEAD') {
            ctx.save(); ctx.translate(player.x + PLAYER_SIZE / 2, player.y + PLAYER_SIZE / 2); ctx.rotate(player.rotation);
            ctx.fillStyle = player.color;
            if (godMode.checked) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'white';
            }
            if (player.mode === 'CUBE') { ctx.fillRect(-PLAYER_SIZE/2, -PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE); ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.strokeRect(-PLAYER_SIZE/2, -PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE); ctx.fillStyle = '#000'; ctx.fillRect(4, -10, 7, 7); ctx.fillRect(4, 3, 7, 7); }
            else { ctx.beginPath(); ctx.moveTo(-18, 12); ctx.lineTo(22, 0); ctx.lineTo(-18, -12); ctx.closePath(); ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke(); }
            ctx.restore();
        }
        particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 6, 6); });
        ctx.globalAlpha = 1.0;
        requestAnimationFrame(() => { update(); draw(); });
    }

    init();
    draw();
</script>
</body>
</html>
